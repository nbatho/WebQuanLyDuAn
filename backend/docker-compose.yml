version: "3.8"

services:
  postgresdb:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgresdb:
        condition: service_healthy
    ports:
      - "${PORT:-5001}:5001"
    environment:
      PORT: 5001
      DB_HOST: postgresdb
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    stdin_open: true
    tty: true

  pgAdmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    depends_on:
      - postgresdb
    ports:
      - "5050:80"
    env_file:
      - ./.env
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
